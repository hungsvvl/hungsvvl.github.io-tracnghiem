    function TreeNode({ node, depth = 0, expanded, onToggle }) {
      const isOpen = expanded[node.id];
      const hasChildren = node.children && node.children.length > 0;

      return (
        <div style={{ marginLeft: depth > 0 ? 16 : 0 }}>
          <div
            onClick={() => hasChildren && onToggle(node.id)}
            style={{
              display: "flex",
              alignItems: "flex-start",
              gap: 10,
              padding: "10px 14px",
              marginBottom: 4,
              borderRadius: 8,
              background: depth === 0 ? node.glow : "transparent",
              border: depth === 0 ? `1px solid ${node.color}33` : "1px solid transparent",
              cursor: hasChildren ? "pointer" : "default",
              transition: "all 0.15s ease",
            }}
            onMouseEnter={(e) => {
              if (depth > 0) e.currentTarget.style.background = COLORS.surfaceHover;
            }}
            onMouseLeave={(e) => {
              if (depth > 0) e.currentTarget.style.background = "transparent";
            }}
          >
            {hasChildren && (
              <span style={{ color: node.color || COLORS.accent, fontFamily: FONTS.mono, fontSize: 11, marginTop: 4, userSelect: "none", minWidth: 14 }}>
                {isOpen ? "▼" : "▶"}
              </span>
            )}
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                {depth === 0 && <span style={{ fontSize: 18 }}>{node.icon}</span>}
                <span style={{
                  fontFamily: FONTS.mono, fontSize: 10, color: node.color || COLORS.accent,
                  background: (node.color || COLORS.accent) + "22", padding: "2px 7px", borderRadius: 4, letterSpacing: 0.5,
                }}>
                  {node.code}
                </span>
                <span style={{
                  fontFamily: depth === 0 ? FONTS.display : FONTS.body,
                  fontSize: depth === 0 ? 16 : 14, fontWeight: depth === 0 ? 700 : 600, color: COLORS.text,
                }}>
                  {node.name}
                </span>
              </div>
              <div style={{ fontFamily: FONTS.body, fontSize: 12, color: COLORS.textMuted, marginTop: 3 }}>{node.desc}</div>
            </div>
          </div>

          {isOpen && hasChildren && (
            <div style={{ borderLeft: `2px solid ${node.color || COLORS.accent}22`, marginLeft: 20, paddingLeft: 4 }}>
              {node.children.map((child) =>
                child.children ? (
                  <TreeNode key={child.id} node={{ ...child, color: node.color, glow: node.glow }} depth={depth + 1} expanded={expanded} onToggle={onToggle} />
                ) : (
                  <div key={child.id} style={{ marginLeft: 16, marginBottom: 6 }}>
                    <div style={{ padding: "8px 12px", borderRadius: 6, background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <span style={{
                          fontFamily: FONTS.mono, fontSize: 10, color: node.color || COLORS.accent,
                          background: (node.color || COLORS.accent) + "18", padding: "1px 6px", borderRadius: 3,
                        }}>
                          {child.code}
                        </span>
                        <span style={{ fontFamily: FONTS.body, fontSize: 13, fontWeight: 600, color: COLORS.text }}>{child.name}</span>
                      </div>
                      <div style={{ fontFamily: FONTS.body, fontSize: 11, color: COLORS.textDim, marginBottom: 6 }}>{child.desc}</div>
                      {child.items && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {child.items.map((item, i) => (
                            <span key={i} style={{
                              fontFamily: FONTS.mono, fontSize: 10, color: COLORS.textMuted,
                              background: COLORS.bg, padding: "3px 8px", borderRadius: 4,
                              border: `1px solid ${COLORS.border}`, lineHeight: 1.4,
                            }}>
                              {item}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                )
              )}
            </div>
          )}
        </div>
      );
    }

    function BoBDiagram() {

            thay vì phụ thuộc một nhà cung cấp ERP duy nhất. Tất cả được kết nối qua <strong style={{ color: COLORS.cyan }}>Enterprise Orchestrator (EO)</strong>.
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 6 }}>
            {bobModules.map((m, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
                background: m.color + "0a", border: `1px solid ${m.color}25`, borderRadius: 8, transition: "all 0.15s",
              }}
                onMouseEnter={e => { e.currentTarget.style.background = m.color + "18"; e.currentTarget.style.borderColor = m.color + "50"; }}

                <div style={{ minWidth: 5, height: 36, background: m.color, borderRadius: 3, opacity: 0.8 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 2 }}>
                    <span style={{ fontFamily: FONTS.display, fontSize: 13, fontWeight: 700, color: COLORS.text }}>{m.name}</span>
                    <span style={{ fontFamily: FONTS.mono, fontSize: 9, color: m.color, background: m.color + "20", padding: "2px 6px", borderRadius: 3 }}>{m.role}</span>
                  </div>
                  <div style={{ fontFamily: FONTS.body, fontSize: 11, color: COLORS.textDim }}>{m.desc}</div>
                </div>
                <div style={{ fontFamily: FONTS.mono, fontSize: 10, color: COLORS.textMuted, textAlign: "right", minWidth: 100, opacity: 0.7 }}>{m.vendor}</div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 20, padding: 14, background: COLORS.cyanGlow, border: `1px solid ${COLORS.cyan}30`, borderRadius: 8 }}>
            <div style={{ fontFamily: FONTS.display, fontSize: 14, fontWeight: 700, color: COLORS.cyan, marginBottom: 10 }}>
              🔑 Nguyên tắc BoB tại UMP
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {[
                ["Loose Coupling", "Kết nối lỏng qua API, không phụ thuộc lẫn nhau"],
                ["Single Source of Truth", "Mỗi thực thể chỉ có 1 Golden Record tại MDM"],
                ["Event-Driven", "Giao tiếp bất đồng bộ qua Event Bus, đảm bảo near real-time"],
                ["Replaceable", "Bất kỳ BoB nào cũng thay thế được mà không ảnh hưởng toàn cục"],
              ].map(([title, desc], i) => (
                <div key={i} style={{ padding: "8px 10px", background: COLORS.bg + "80", borderRadius: 6 }}>
                  <div style={{ fontFamily: FONTS.mono, fontSize: 11, color: COLORS.cyan, fontWeight: 600, marginBottom: 2 }}>{title}</div>
                  <div style={{ fontFamily: FONTS.body, fontSize: 11, color: COLORS.textMuted }}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function DataFlowView() {
      const flows = [
        {

            { sys: "EO", action: "Validate: SV đủ điều kiện? (prerequisite check)" },

        {

            { sys: "LMS", action: "Thời gian online, bài nộp, tương tác" },

      return (

          <div style={{ fontFamily: FONTS.body, fontSize: 13, color: COLORS.textMuted, marginBottom: 20, lineHeight: 1.7 }}>
            Minh họa cách <strong style={{ color: COLORS.cyan }}>Enterprise Orchestrator</strong> điều phối Master Data xuyên suốt 3 hệ sinh thái,
            đảm bảo dữ liệu <strong style={{ color: COLORS.green }}>"Sạch – Sống"</strong> và sẵn sàng cho AI Agent tiêu thụ.
          </div>
          {flows.map((flow, fi) => (
            <div key={fi} style={{ marginBottom: 14, padding: 14, background: flow.color + "08", border: `1px solid ${flow.color}20`, borderRadius: 10 }}>
              <div style={{ fontFamily: FONTS.display, fontSize: 13, fontWeight: 700, color: flow.color, marginBottom: 10 }}>{flow.title}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>

                    <span style={{

    function GovernanceView() {
      const principles = [
        {
          icon: "🏛️", title: "Data Governance Framework", color: COLORS.accent,
          items: [
            { label: "Data Owner", desc: "Trưởng đơn vị chịu trách nhiệm chất lượng dữ liệu domain" },
            { label: "Data Steward", desc: "Chuyên viên quản trị dữ liệu hàng ngày, enforce policy" },
            { label: "Data Council", desc: "Hội đồng dữ liệu cấp trường – quyết định tiêu chuẩn & tranh chấp" },
            { label: "Golden Record", desc: "Mỗi thực thể chỉ có 1 bản gốc duy nhất trong MDM" },
          ],
        },
        {
          icon: "🔄", title: "Nguyên tắc 'Sạch – Sống'", color: COLORS.green,
          items: [
            { label: "Sạch (Clean)", desc: "Data Quality Score ≥ 95%, validate tự động khi nhập" },
            { label: "Sống (Live)", desc: "Real-time CDC – mọi thay đổi phản ánh ≤ 5 phút" },
            { label: "Unique", desc: "Deduplication engine – không trùng lặp golden record" },
            { label: "Traceable", desc: "Data Lineage – truy vết nguồn gốc mọi trường dữ liệu" },
          ],

        {

            { label: "PII Masking", desc: "Thông tin cá nhân masking khi ra khỏi domain gốc" },
            { label: "RBAC + ABAC", desc: "Phân quyền theo vai trò + thuộc tính (khoa/campus/BN)" },
            { label: "Consent Mgmt", desc: "Quản lý đồng ý BN cho nghiên cứu / đào tạo" },
          ],

        {
          icon: "🤖", title: "AI-Ready Architecture", color: COLORS.purple,
          items: [
            { label: "Vector Embedding", desc: "Master Data embedding cho RAG pipeline" },
            { label: "Feature Store", desc: "Kho đặc trưng chuẩn hóa cho ML model" },

            Khung quản trị 4 trụ cột cho UMP:

    const TABS = [
      { id: "tree", label: "🌳 Cây Master Data", desc: "Cấu trúc thư mục chi tiết" },
      { id: "bob", label: "🧩 Mô hình BoB", desc: "Best-of-Breed Architecture" },
      { id: "flow", label: "⚡ Luồng Dữ liệu", desc: "Data Flow cross-domain" },
      { id: "gov", label: "🛡️ Quản trị DL", desc: "Governance & AI-Ready" },
    ];

    function UMPMasterData() {
      const [activeTab, setActiveTab] = useState("tree");
      const [expanded, setExpanded] = useState({ PH0: true, PH1: true });

      const onToggle = useCallback((id) => {
        setExpanded((prev) => ({ ...prev, [id]: !prev[id] }));
      }, []);

      const expandAll = () => {
        const all = {};
        masterDataTree.forEach((n) => { all[n.id] = true; });
        setExpanded(all);
      };
      const collapseAll = () => setExpanded({});

      return (
        <div style={{
          fontFamily: FONTS.body, background: COLORS.bg, color: COLORS.text,
          minHeight: "100vh", padding: "24px 16px", maxWidth: 880, margin: "0 auto",
        }}>
          <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontFamily: FONTS.mono, fontSize: 10, color: COLORS.cyan, letterSpacing: 3, textTransform: "uppercase", marginBottom: 6 }}>
              ĐẠI HỌC Y DƯỢC TP.HCM — ERP MASTER DATA ARCHITECTURE

            <h1 style={{ fontFamily: FONTS.display, fontSize: 26, fontWeight: 800, color: COLORS.text, margin: "0 0 6px 0", lineHeight: 1.2 }}>

            </h1>
            <div style={{ fontFamily: FONTS.body, fontSize: 12, color: COLORS.textDim, maxWidth: 560, margin: "0 auto" }}>
              Kiến trúc dữ liệu dùng chung cho 3 hệ sinh thái: Đào tạo · Nghiên cứu · Y tế — Mô hình BoB + Enterprise Orchestrator
            </div>
          </div>

          <div style={{ display: "flex", gap: 5, marginBottom: 16, overflowX: "auto", paddingBottom: 2 }}>
            {TABS.map((tab) => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                flex: "1 1 0", minWidth: 130, padding: "9px 10px", borderRadius: 8,
                border: activeTab === tab.id ? `1px solid ${COLORS.borderActive}` : `1px solid ${COLORS.border}`,
                background: activeTab === tab.id ? COLORS.accentGlow : COLORS.surface,
                color: activeTab === tab.id ? COLORS.accent : COLORS.textMuted,
                cursor: "pointer", fontFamily: FONTS.body, fontSize: 12, fontWeight: 600, textAlign: "center", transition: "all 0.15s", lineHeight: 1.3,
              }}>
                <div>{tab.label}</div>
                <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.7, marginTop: 2 }}>{tab.desc}</div>
              </button>
            ))}
          </div>

          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 18, minHeight: 400 }}>
            {activeTab === "tree" && (
              <div>
                <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                  <button onClick={expandAll} style={{
                    padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.border}`,
                    background: COLORS.surface, color: COLORS.textMuted, cursor: "pointer", fontFamily: FONTS.mono, fontSize: 11,
                  }}>▼ Mở tất cả</button>
                  <button onClick={collapseAll} style={{
                    padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.border}`,
                    background: COLORS.surface, color: COLORS.textMuted, cursor: "pointer", fontFamily: FONTS.mono, fontSize: 11,
                  }}>▶ Đóng tất cả</button>
                </div>
                {masterDataTree.map((node) => (
                  <TreeNode key={node.id} node={node} depth={0} expanded={expanded} onToggle={onToggle} />
                ))}
              </div>
            )}
            {activeTab === "bob" && <BoBDiagram />}
            {activeTab === "flow" && <DataFlowView />}
            {activeTab === "gov" && <GovernanceView />}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginTop: 14 }}>
            {[
              { label: "Domain chính", value: "6", color: COLORS.accent },
              { label: "Nhóm MD", value: "22", color: COLORS.green },
              { label: "Thực thể", value: "120+", color: COLORS.purple },
              { label: "BoB Systems", value: "9", color: COLORS.cyan },
            ].map((s, i) => (
              <div key={i} style={{
                textAlign: "center", padding: "10px 6px", background: s.color + "08",
                border: `1px solid ${s.color}20`, borderRadius: 8,
              }}>
                <div style={{ fontFamily: FONTS.display, fontSize: 20, fontWeight: 800, color: s.color }}>{s.value}</div>
                <div style={{ fontFamily: FONTS.body, fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>{s.label}</div>
              </div>

          <div style={{ textAlign: "center", marginTop: 20, fontFamily: FONTS.mono, fontSize: 10, color: COLORS.textDim, letterSpacing: 1 }}>
            UMP ERP MASTER DATA v1.0 · 2025 · Enterprise Architecture Division
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<UMPMasterData />);
  </script>
</body>
